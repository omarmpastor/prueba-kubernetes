apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent-deployment
  namespace: homeserver
spec:
  replicas: 1

  selector:
    matchLabels:
      app: qbittorrent

  template:
    metadata:
      labels:
        app: qbittorrent

    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: IfNotPresent

          env:
            - name: PUID
              value: "1000"

            - name: PGID
              value: "1000"

            - name: TZ
              value: Europe/Madrid
            
            - name: WEBUI_PORT
              value: "8090"

          ports:
            - containerPort: 8090
              name: http
              protocol: TCP

            - containerPort: 6881
              name: bittorrent-tcp
              protocol: TCP

            - containerPort: 6881
              name: bittorrent-udp
              protocol: UDP

          volumeMounts:
            - name: config
              mountPath: /config

            - name: downloads
              mountPath: /downloads

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: qbittorrent-pvc-config

        - name: downloads
          hostPath:
            path: /mnt/storage/torrents
            type: Directory


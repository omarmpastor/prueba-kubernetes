apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr-deployment
  namespace: homeserver
spec:
  replicas: 1

  selector:
    matchLabels:
      app: sonarr

  template:
    metadata:
      labels:
        app: sonarr

    spec:
      securityContext:
        fsGroup: 1000

      containers:
        - name: sonarr
          image: lscr.io/linuxserver/sonarr:latest
          imagePullPolicy: IfNotPresent

          env:
            - name: PUID
              value: "1000"

            - name: PGID
              value: "1000"

            - name: TZ
              value: Europe/Madrid

          ports:
            - containerPort: 8989
              name: http

          volumeMounts:
            - name: config
              mountPath: /config

            - name: downloads
              mountPath: /downloads

            - name: tvshows
              mountPath: /storage/TV

      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: sonarr-pvc-config

        - name: downloads
          hostPath:
            path: /mnt/storage/torrents
            type: Directory

        - name: tvshows
          hostPath:
            path: /mnt/storage/media/tv
            type: Directory
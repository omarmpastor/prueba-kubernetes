apiVersion: apps/v1
kind: Deployment
metadata:
  name: pihole-deployment
  namespace: homeserver

spec:
  replicas: 1

  selector:
    matchLabels:
      app: pihole

  template:
    metadata:
      labels:
        app: pihole

    spec:
      containers:
      - name: pihole
        image: pihole/pihole:latest
      
      # hostNetwork: true
      # dnsPolicy: ClusterFirstWithHostNet

        ports:
          - name: http
            containerPort: 80
            protocol: TCP
          
          - name: dns-tcp
            containerPort: 53
            hostPort: 53
            protocol: TCP
          
          - name: dns-udp
            containerPort: 53
            hostPort: 53
            protocol: UDP

        env:
        - name: TZ
          value: Europe/Madrid

        - name: FTLCONF_webserver_api_password
          valueFrom:
            secretKeyRef:
              name: homeserver-secret
              key: APP_PASSWORD

        - name: FTLCONF_dns_listeningMode
          value: "ALL"

        # - name: FTLCONF_webserver_port
        #   value: "8084"

        volumeMounts:
        - name: pihole-config
          mountPath: /etc/pihole

      volumes:
      - name: pihole-config
        persistentVolumeClaim:
          claimName: pihole-pvc-config